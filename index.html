<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>送给我最爱的老婆❤️</title>

<style>
body {
    margin: 0;
    overflow: hidden;
    background: black;
    color: white;
    font-family: "微软雅黑";
    text-align: center;
}

/* 星空 */
canvas {
    position: fixed;
    top: 0;
    left: 0;
}

/* 信封 */
#envelope {
    position: absolute;
    top: 40%;
    width: 200px;
    height: 120px;
    background: #ff4d6d;
    margin-left: -100px;
    left: 50%;
    cursor: pointer;
    border-radius: 10px;
    animation: pulse 1.5s infinite;
}

@keyframes pulse {
    0% { transform: scale(1); }
    50% { transform: scale(1.1); }
    100% { transform: scale(1); }
}

/* 内容 */
#content {
    display: none;
    position: absolute;
    top: 20%;
    width: 100%;
}

/* 照片 */
img {
    width: 200px;
    border-radius: 15px;
    margin-top: 20px;
}

/* 爱心 */
.heart {
    position: absolute;
    color: red;
    font-size: 20px;
    animation: float 6s linear infinite;
}

@keyframes float {
    from { transform: translateY(0); opacity:1;}
    to { transform: translateY(-800px); opacity:0;}
}
</style>
</head>

<body>

<canvas id="stars"></canvas>

<div id="envelope">💌 点我打开</div>

<div id="content">
    <h1 id="text"></h1>
    <img id="photo" src="https://picsum.photos/200" />
</div>

<audio id="music" loop>
    <source src="https://www.w3schools.com/html/horse.mp3" type="audio/mp3">
</audio>

<script>
/* 星空 */
const canvas = document.getElementById("stars");
const ctx = canvas.getContext("2d");
canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

let stars = [];
for(let i=0;i<200;i++){
    stars.push({
        x: Math.random()*canvas.width,
        y: Math.random()*canvas.height,
        r: Math.random()*2
    });
}

function drawStars(){
    ctx.clearRect(0,0,canvas.width,canvas.height);
    ctx.fillStyle="white";
    stars.forEach(s=>{
        ctx.beginPath();
        ctx.arc(s.x,s.y,s.r,0,2*Math.PI);
        ctx.fill();
        s.y += 0.2;
        if(s.y>canvas.height) s.y=0;
    });
    requestAnimationFrame(drawStars);
}
drawStars();

/* 打开信封 */
document.getElementById("envelope").onclick = function(){
    this.style.display="none";
    document.getElementById("content").style.display="block";

    document.getElementById("music").play();

    typing();
    startHearts();
    startSlideshow();
}

/* 打字 */
const msg = "❤️ 老婆，520节日快乐！愿你每天都被爱包围 ❤️";
let i=0;
function typing(){
    if(i<msg.length){
        document.getElementById("text").innerHTML += msg[i];
        i++;
        setTimeout(typing,100);
    }
}

/* 爱心 */
function startHearts(){
    setInterval(()=>{
        let h=document.createElement("div");
        h.className="heart";
        h.innerHTML="❤️";
        h.style.left=Math.random()*window.innerWidth+"px";
        h.style.top=window.innerHeight+"px";
        document.body.appendChild(h);
        setTimeout(()=>h.remove(),6000);
    },300);
}

/* 照片轮播（替换成你们照片） */
const photos = [
    "https://picsum.photos/200?1",
    "https://picsum.photos/200?2",
    "https://picsum.photos/200?3"
];

let idx=0;
function startSlideshow(){
    setInterval(()=>{
        idx=(idx+1)%photos.length;
        document.getElementById("photo").src=photos[idx];
    },2000);
}

/* 微信自动播放 */
document.addEventListener("WeixinJSBridgeReady", function () {
    document.getElementById("music").play();
});
</script>

</body>
</html>
