<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>罗豪 ❤️ 罗娜</title>

<style>
body{
    margin:0;
    overflow:hidden;
    background:linear-gradient(135deg,#ff6b81,#ff9ff3,#c44569);
    color:#fff;
    font-family:"微软雅黑";
    text-align:center;
}

/* 信封 */
#envelope{
    position:absolute;
    top:40%;
    left:50%;
    transform:translate(-50%,-50%);
    background:#ff4d6d;
    padding:20px 40px;
    border-radius:15px;
    cursor:pointer;
    animation:pulse 1.5s infinite;
}

@keyframes pulse{
    50%{transform:translate(-50%,-50%) scale(1.1);}
}

/* 主内容 */
#main{
    display:none;
    margin-top:5vh;
}

/* 名字 */
.names{
    font-size:28px;
    margin-bottom:10px;
    animation: glow 2s infinite alternate;
}

@keyframes glow{
    from{text-shadow:0 0 10px #fff;}
    to{text-shadow:0 0 30px #ff4d6d;}
}

/* 地图 */
#map{
    margin:10px;
    font-size:16px;
}

/* 图片 */
img{
    width:240px;
    border-radius:15px;
    margin-top:10px;
    box-shadow:0 0 15px rgba(255,255,255,0.5);
}

/* 回忆文字 */
#story{
    margin:10px 30px;
    font-size:16px;
}

/* 爱心 */
.heart{
    position:absolute;
    color:red;
    animation:float 6s linear infinite;
}

@keyframes float{
    from{transform:translateY(0);opacity:1;}
    to{transform:translateY(-800px);opacity:0;}
}
</style>
</head>

<body>

<div id="envelope">💌 罗娜，点一下看看❤️</div>

<div id="main">
    <div class="names">罗豪 ❤️ 罗娜</div>

    <div id="days"></div>

    <canvas id="heartCanvas"></canvas>

    <div id="map">
        📍 吃串串 ➝ 干烧烤（第一次吻你） ➝ 都江堰（第一次旅行） ➝ 未来一路有你 ❤️
    </div>

    <img id="photo">
    <div id="story"></div>
</div>

<!-- 🎵 浪漫BGM -->
<audio id="music" loop preload="auto">
    <source src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3" type="audio/mpeg">
</audio>

<script>

/* ✅ 音乐控制 */
let music = document.getElementById("music");

function playMusic(){
    music.play().catch(()=>{});
    music.volume = 0.2;
    setTimeout(()=>{music.volume = 0.6;},3000);
}

/* 💌 打开 */
document.getElementById("envelope").onclick=function(){
    this.style.display="none";
    document.getElementById("main").style.display="block";

    playMusic();

    calcDays();
    startStory();
    hearts();
}

/* ❤️ 恋爱天数 */
function calcDays(){
    let start=new Date("2025-11-21"); // 改你的日期
    let now=new Date();
    let days=Math.floor((now-start)/(1000*60*60*24));

    document.getElementById("days").innerHTML=
    "❤️ 我们已经在一起 "+days+" 天 ❤️";
}

/* 📸 回忆 */
const memories=[
{img:"1.jpg", text:"第一次见到你，我就觉得你很特别"},
{img:"2.jpg", text:"慢慢熟悉之后，你的笑成了我的日常快乐"},
{img:"3.jpg", text:"从那以后，普通的日子也变得闪闪发光"},
{img:"4.jpg", text:"你走进我的世界，成了我最重要的人"},
{img:"5.jpg", text:"罗娜 ❤️ 520快乐，未来的路我会一直陪着你"}
];

let i=0;

function startStory(){
    showMemory();
}

function showMemory(){
    if(i<memories.length){
        document.getElementById("photo").src=memories[i].img;
        typeText(memories[i].text);
        i++;
        setTimeout(showMemory,4000);
    }
}

/* ✨ 打字 */
function typeText(text){
    let box=document.getElementById("story");
    box.innerHTML="";
    let j=0;

    let timer=setInterval(()=>{
        box.innerHTML+=text[j];
        j++;
        if(j>=text.length) clearInterval(timer);
    },50);
}

/* 💖 漂浮爱心 */
function hearts(){
    setInterval(()=>{
        let h=document.createElement("div");
        h.className="heart";
        h.innerHTML="❤️";
        h.style.left=Math.random()*window.innerWidth+"px";
        h.style.top=window.innerHeight+"px";
        document.body.appendChild(h);
        setTimeout(()=>h.remove(),6000);
    },300);
}

/* ❤️ 爱心拼名字 */
const canvas=document.getElementById("heartCanvas");
const ctx=canvas.getContext("2d");
canvas.width=window.innerWidth;
canvas.height=150;

let particles=[];
for(let i=0;i<300;i++){
    particles.push({
        x:Math.random()*canvas.width,
        y:Math.random()*canvas.height
    });
}

function drawText(){
    ctx.clearRect(0,0,canvas.width,canvas.height);
    ctx.fillStyle="red";
    ctx.font="30px 微软雅黑";
    ctx.textAlign="center";
    ctx.fillText("罗豪 ❤️ 罗娜",canvas.width/2,80);
}

function animate(){
    drawText();
    let data=ctx.getImageData(0,0,canvas.width,canvas.height);

    particles.forEach(p=>{
        let index=(Math.floor(p.y)*canvas.width+Math.floor(p.x))*4;
        if(data.data[index+3]>128){
            ctx.fillStyle="red";
            ctx.beginPath();
            ctx.arc(p.x,p.y,2,0,2*Math.PI);
            ctx.fill();
        }
    });

    requestAnimationFrame(animate);
}
animate();

/* ✅ 微信自动播放 */
document.addEventListener("WeixinJSBridgeReady", function () {
    playMusic();
});

</script>

</body>
</html>
