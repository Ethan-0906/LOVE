<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>罗豪 ❤️ 罗娜</title>

<style>
body {
    margin:0;
    overflow:hidden;
    font-family:"微软雅黑";
    text-align:center;
    color:white;
    background:linear-gradient(135deg,#ff6b81,#ff9ff3,#c44569);
}

/* 信封 */
#envelope {
    position:absolute;
    top:40%;
    left:50%;
    transform:translate(-50%,-50%);
    background:#ff4d6d;
    padding:20px 40px;
    border-radius:12px;
    cursor:pointer;
    font-size:20px;
    animation:pulse 1.5s infinite;
}

@keyframes pulse {
    0%{transform:translate(-50%,-50%) scale(1);}
    50%{transform:translate(-50%,-50%) scale(1.1);}
    100%{transform:translate(-50%,-50%) scale(1);}
}

/* 内容 */
#main {
    display:none;
    margin-top:20vh;
}

/* 名字特效 */
.names {
    font-size:30px;
    margin-bottom:20px;
    animation: glow 2s infinite alternate;
}
@keyframes glow {
    from {text-shadow:0 0 10px #fff;}
    to {text-shadow:0 0 30px #ff4d6d;}
}

/* 爱心 */
.heart {
    position:absolute;
    color:red;
    animation: float 6s linear infinite;
}
@keyframes float {
    from {transform:translateY(0);opacity:1;}
    to {transform:translateY(-800px);opacity:0;}
}

/* 打字 */
#text {
    font-size:20px;
    padding:0 20px;
}
</style>
</head>

<body>

<div id="envelope">💌 罗娜，点这里</div>

<div id="main">
    <div class="names">罗豪 ❤️ 罗娜</div>
    <div id="text"></div>
</div>

<audio id="music" loop>
    <source src="https://www.w3schools.com/html/horse.mp3" type="audio/mp3">
</audio>

<script>

/* 打开信封 */
document.getElementById("envelope").onclick = function(){
    this.style.display="none";
    document.getElementById("main").style.display="block";

    document.getElementById("music").play();

    typing();
    hearts();
}

/* 打字表白 */
const msg = "罗娜 ❤️ 520节日快乐！从遇见你开始，我日历上的普通日子，就悄悄的变成了花期。即见君子，云胡不喜。剩下的日子我陪你一起走";
let i=0;
function typing(){
    if(i<msg.length){
        document.getElementById("text").innerHTML+=msg[i];
        i++;
        setTimeout(typing,80);
    }
}

/* 爱心特效 */
function hearts(){
    setInterval(()=>{
        let h=document.createElement("div");
        h.className="heart";
        h.innerHTML="❤️";
        h.style.left=Math.random()*window.innerWidth+"px";
        h.style.top=window.innerHeight+"px";
        h.style.fontSize=(Math.random()*20+20)+"px";
        document.body.appendChild(h);
        setTimeout(()=>h.remove(),6000);
    },300);
}

/* 微信自动播放 */
document.addEventListener("WeixinJSBridgeReady", function () {
    document.getElementById("music").play();
});

</script>

</body>
</html>
